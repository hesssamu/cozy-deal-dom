<style>
  :root { --bg: #F3F2ED; --ink: #1C2620; --muted: #5E6A62; --accent: #0E8A56; --line: #DDDCD3; --surface: #FCFBF8; }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #121A15; --ink: #E8EDE9; --muted: #9AA79E; --accent: #2FA974; --line: #263129; --surface: #17201B; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .box { max-width: 380px; width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 28px; }
  h1 { font-family: "Iowan Old Style", Palatino, Georgia, serif; font-size: 22px; margin: 0 0 6px; }
  p { color: var(--muted); font-size: 14.5px; margin: 0 0 18px; }
  input { width: 100%; padding: 13px 14px; font-size: 16px; border: 1px solid var(--line); border-radius: 10px;
          background: var(--bg); color: var(--ink); margin-bottom: 12px; }
  button { width: 100%; padding: 13px; border: 0; border-radius: 10px; background: var(--accent); color: #fff;
           font: 600 15px/1.1 inherit; cursor: pointer; }
  .err { color: #B4483E; font-size: 13.5px; margin-top: 10px; display: none; }
</style>

  </form>
</div>

function b64u8(s) { var b = atob(s), u = new Uint8Array(b.length); for (var i = 0; i < b.length; i++) u[i] = b.charCodeAt(i); return u; }
document.getElementById("f").addEventListener("submit", function (e) {
  e.preventDefault();
  var pw = document.getElementById("pw").value;
  var enc = new TextEncoder();
  crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]).then(function (km) {
    return crypto.subtle.deriveKey({ name: "PBKDF2", salt: b64u8(SALT), iterations: 300000, hash: "SHA-256" }, km,
      { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  }).then(function (key) {
    return crypto.subtle.decrypt({ name: "AES-GCM", iv: b64u8(IV) }, key, b64u8(DATA));
  }).then(function (plain) {
    var html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }).catch(function () {
    document.getElementById("err").style.display = "block";
  });
});
